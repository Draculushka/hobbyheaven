<!DOCTYPE html>
<html>
<head>
    <title>Edit Post</title>
    <!-- Include CKEditor for the "HTML box" -->
    <script src="https://cdn.ckeditor.com/ckeditor5/40.0.0/classic/ckeditor.js"></script>
    <style>
        .container { max-width: 800px; margin: 0 auto; padding: 20px; font-family: Arial, sans-serif; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"] { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .ck-editor__editable { min-height: 200px; }
        button { background-color: #007bff; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Edit Post</h1>
        <form action="/update/{{ post.id }}" method="post" enctype="multipart/form-data">
            <div class="form-group">
                <label for="author">Author:</label>
                <input type="text" id="author" name="author" value="{{ post.author }}" required>
            </div>
            <div class="form-group">
                <label for="title">Title:</label>
                <input type="text" id="title" name="title" value="{{ post.title }}" required>
            </div>
            <div class="form-group">
                <label for="description">Description (HTML Box):</label>
                <textarea name="description" id="editor">{{ post.description }}</textarea>
            </div>
            <div class="form-group">
                <label for="image">Change Image (Optional):</label>
                <input type="file" id="image" name="image">
            </div>
            <button type="submit">Update Post</button>
            <a href="/">Back to Home</a>
        </form>
    </div>

    <script>
        ClassicEditor
            .create(document.querySelector('#editor'))
            .catch(error => {
                console.error(error);
            });
    </script>
</body>
</html>
