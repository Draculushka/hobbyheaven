{% extends "base.html" %}

{% block title %}Регистрация — HobbyHeaven{% endblock %}

{% block body_class %}flex items-center justify-center min-h-screen{% endblock %}

{% block content %}
<div class="max-w-md w-full p-8 bg-white rounded-card border border-border shadow-xl mx-4">
    <div class="text-center mb-10">
        <h1 class="text-4xl font-bold mb-2">Присоединяйтесь</h1>
        <p class="text-muted font-serif italic">Создайте свой уголок в Раю</p>
    </div>

    <form action="/register" method="post" class="space-y-6">
        <div class="space-y-2">
            <label for="reg-username" class="text-sm font-semibold uppercase tracking-wider text-muted-light ml-1">Имя профиля (Псевдоним)</label>
            <input id="reg-username" class="w-full bg-surface border-none rounded-2xl p-4 focus:ring-2 focus:ring-primary-dark outline-none transition-all"
                   type="text" name="username" required>
        </div>
        <div class="space-y-2">
            <label for="reg-email" class="text-sm font-semibold uppercase tracking-wider text-muted-light ml-1">Email (Для входа)</label>
            <input id="reg-email" class="w-full bg-surface border-none rounded-2xl p-4 focus:ring-2 focus:ring-primary-dark outline-none transition-all"
                   type="email" name="email" required>
        </div>
        <div class="space-y-2">
            <label for="reg-password" class="text-sm font-semibold uppercase tracking-wider text-muted-light ml-1">Пароль</label>
            <input id="reg-password" class="w-full bg-surface border-none rounded-2xl p-4 focus:ring-2 focus:ring-primary-dark outline-none transition-all"
                   type="password" name="password" minlength="6" maxlength="64" required>
        </div>

        <button class="w-full bg-primary-dark text-white font-bold py-4 rounded-2xl hover:bg-primary-deep shadow-lg shadow-orange-200 transition-all active:scale-95" type="submit">
            Зарегистрироваться
        </button>
    </form>

    <div class="mt-8 text-center text-sm text-muted">
        Уже есть аккаунт? <a href="/login" class="text-primary-dark font-bold hover:underline">Войти</a>
    </div>
</div>
{% endblock %}
