<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация — HobbyHeaven</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lora:ital,wght@0,600;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #FDFCF0; }
        h1, .font-serif { font-family: 'Lora', serif; }
    </style>
</head>
<body class="text-[#2D3436] antialiased flex items-center justify-center min-h-screen">
    <div class="max-w-md w-full p-8 bg-white rounded-[32px] border border-[#F1F2F6] shadow-xl">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-bold mb-2">Присоединяйтесь</h1>
            <p class="text-[#7F8C8D] font-serif italic">Создайте свой уголок в Раю</p>
        </div>
        
        <form action="/register" method="post" class="space-y-6">
            <div class="space-y-2">
                <label class="text-sm font-semibold uppercase tracking-wider text-[#95A5A6] ml-1">Имя профиля (Псевдоним)</label>
                <input class="w-full bg-[#F8F9FA] border-none rounded-2xl p-4 focus:ring-2 focus:ring-[#E67E22] outline-none transition-all" 
                       type="text" name="username" required>
            </div>
            <div class="space-y-2">
                <label class="text-sm font-semibold uppercase tracking-wider text-[#95A5A6] ml-1">Email (Для входа)</label>
                <input class="w-full bg-[#F8F9FA] border-none rounded-2xl p-4 focus:ring-2 focus:ring-[#E67E22] outline-none transition-all" 
                       type="email" name="email" required>
            </div>
            <div class="space-y-2">
                <label class="text-sm font-semibold uppercase tracking-wider text-[#95A5A6] ml-1">Пароль</label>
                <input class="w-full bg-[#F8F9FA] border-none rounded-2xl p-4 focus:ring-2 focus:ring-[#E67E22] outline-none transition-all" 
                       type="password" name="password" minlength="6" maxlength="64" required>
            </div>
            
            <button class="w-full bg-[#E67E22] text-white font-bold py-4 rounded-2xl hover:bg-[#D35400] shadow-lg shadow-orange-200 transition-all active:scale-95" type="submit">
                Зарегистрироваться
            </button>
        </form>
        
        <div class="mt-8 text-center text-sm text-[#7F8C8D]">
            Уже есть аккаунт? <a href="/login" class="text-[#E67E22] font-bold hover:underline">Войти</a>
        </div>
    </div>
</body>
</html>
