<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Верификация Email — HobbyHeaven</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,600;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #FDFCF0; }
        h1, .font-serif { font-family: 'Lora', serif; }
    </style>
</head>
<body class="text-[#2D3436] antialiased flex items-center justify-center min-h-screen">
    <div class="bg-white p-10 md:p-12 rounded-[48px] shadow-sm border border-[#F1F2F6] max-w-md w-full mx-4">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-bold mb-4 text-[#2D3436]">Подтверждение</h1>
            <p class="text-[#7F8C8D]">Мы отправили код на вашу почту. Введите его ниже.</p>
        </div>
        
        {% if error %}
        <div class="bg-red-50 text-red-500 p-4 rounded-2xl mb-6 text-sm font-medium text-center">
            {{ error }}
        </div>
        {% endif %}

        <form action="/verify-email" method="post" class="space-y-6">
            <input type="hidden" name="email" value="{{ email }}">
            <div>
                <label class="block text-sm font-bold text-[#2D3436] mb-2 uppercase tracking-wider">Код подтверждения</label>
                <input type="text" name="code" class="w-full bg-[#F8F9FA] border-none rounded-2xl px-6 py-4 text-center text-2xl tracking-[0.5em] font-bold focus:ring-2 focus:ring-[#EE5253] outline-none transition-all" required maxlength="6" autocomplete="off" placeholder="------">
            </div>
            
            <button type="submit" class="w-full bg-[#2D3436] hover:bg-[#EE5253] text-white px-6 py-4 rounded-2xl font-bold transition-all shadow-lg hover:shadow-red-200 uppercase tracking-widest text-sm mt-4">
                Подтвердить
            </button>
        </form>
    </div>
</body>
</html>
