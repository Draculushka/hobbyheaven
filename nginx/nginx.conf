events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # DoS protection: limit request body size
    client_max_body_size 10M;

    # Rate limiting zone for auth endpoints
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

    # Конфигурация для сервера
    server {
        listen       80;
        server_name  localhost;

        # Security headers
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;

        # Статические файлы (JS, CSS, изображения)
        location /static/ {
            alias /app/static/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # Загруженные пользователями изображения
        location /uploads/ {
            alias /app/uploads/;
            expires 30d;
            add_header Cache-Control "public";
        }

        # Rate-limited auth endpoints
        location ~ ^/(login|register|verify-email|cabinet/delete) {
            limit_req zone=auth burst=3 nodelay;
            proxy_pass http://web:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Все остальные запросы отправляем на FastAPI (контейнер 'web')
        location / {
            proxy_pass http://web:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
