version: "3.8"

services:
  # База данных PostgreSQL
  db:
    image: postgres:16
    container_name: hobby_db
    env_file: .env
    volumes:
      # Используем новую версию данных для чистоты
      - ./data/postgres_v2:/var/lib/postgresql/data
    networks:
      - hobby_network
    restart: always

  # FastAPI приложение
  web:
    build: .
    container_name: hobby_web
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    volumes:
      - .:/app
      - ./data/uploads:/app/uploads
    networks:
      - hobby_network
    restart: always

  # Redis для кэширования и кулдаунов
  redis:
    image: redis:alpine
    container_name: hobby_redis
    networks:
      - hobby_network
    restart: always

  # Веб-сервер Nginx (Reverse Proxy)
  nginx:
    image: nginx:latest
    container_name: hobby_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./data/uploads:/app/uploads:ro
    depends_on:
      - web
    networks:
      - hobby_network
    restart: always

networks:
  hobby_network:
    driver: bridge
