services:
  # База данных PostgreSQL
  db:
    image: postgres:16
    container_name: hobby_db
    env_file: .env
    volumes:
      - ./data/postgres_v2:/var/lib/postgresql/data
    networks:
      - hobby_network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 5s
      timeout: 3s
      retries: 5

  # FastAPI приложение
  web:
    build: .
    container_name: hobby_web
    env_file: .env
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      - S3_ENDPOINT=http://minio:9000
      - S3_PUBLIC_URL=http://localhost:9000/hobbyhold
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - ./data/uploads:/app/uploads
    networks:
      - hobby_network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/debug-p\")'"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:alpine
    container_name: hobby_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    networks:
      - hobby_network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $${REDIS_PASSWORD:-changeme} --no-auth-warning ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Nginx
  nginx:
    image: nginx:latest
    container_name: hobby_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./static:/app/static:ro
      - ./data/uploads:/app/uploads:ro
    depends_on:
      web:
        condition: service_healthy
    networks:
      - hobby_network
    restart: always

  # MinIO (S3 Object Storage) - Используем конкретную стабильную версию
  minio:
    image: minio/minio:RELEASE.2023-12-23T07-19-11Z
    container_name: hobby_minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${S3_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${S3_SECRET_KEY:-minioadmin}
    volumes:
      - ./data/minio:/data
    networks:
      - hobby_network
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: always

  # Воркер для видео
  worker:
    build: .
    container_name: hobby_worker
    command: celery -A core.celery_app worker --loglevel=info
    env_file: .env
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      - S3_ENDPOINT=http://minio:9000
      - S3_PUBLIC_URL=http://localhost:9000/hobbyhold
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    volumes:
      - .:/app
      - ./data/uploads:/app/uploads
    networks:
      - hobby_network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "celery -A core.celery_app inspect ping"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  hobby_network:
    driver: bridge
