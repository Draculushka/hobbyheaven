services:
  # База данных PostgreSQL
  db:
    image: postgres:16
    container_name: hobby_db
    env_file: .env
    volumes:
      # Используем новую версию данных для чистоты
      - ./data/postgres_v2:/var/lib/postgresql/data
    networks:
      - hobby_network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 5s
      timeout: 3s
      retries: 5

  # FastAPI приложение
  web:
    build: .
    container_name: hobby_web
    env_file: .env
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app  # DEV ONLY — remove in production
      - ./data/uploads:/app/uploads
    networks:
      - hobby_network
    restart: always

  # Redis для кэширования и кулдаунов
  redis:
    image: redis:alpine
    container_name: hobby_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    networks:
      - hobby_network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $${REDIS_PASSWORD:-changeme} --no-auth-warning ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Веб-сервер Nginx (Reverse Proxy)
  nginx:
    image: nginx:latest
    container_name: hobby_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./data/uploads:/app/uploads:ro
    depends_on:
      - web
    networks:
      - hobby_network
    restart: always

networks:
  hobby_network:
    driver: bridge
