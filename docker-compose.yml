services:
  # База данных PostgreSQL
  db:
    image: postgres:16
    container_name: hobby_db
    env_file: .env
    volumes:
      # Используем новую версию данных для чистоты
      - ./data/postgres_v2:/var/lib/postgresql/data
    networks:
      - hobby_network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 5s
      timeout: 3s
      retries: 5

  # FastAPI приложение
  web:
    build: .
    container_name: hobby_web
    env_file: .env
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app  # DEV ONLY — remove in production
      - ./data/uploads:/app/uploads
    networks:
      - hobby_network
    restart: always

  # Redis для кэширования и кулдаунов
  redis:
    image: redis:alpine
    container_name: hobby_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    networks:
      - hobby_network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $${REDIS_PASSWORD:-changeme} --no-auth-warning ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Веб-сервер Nginx (Reverse Proxy)
  nginx:
    image: nginx:latest
    container_name: hobby_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./data/uploads:/app/uploads:ro
    depends_on:
      - web
    networks:
      - hobby_network
    restart: always

  # MinIO (S3 Object Storage)
  minio:
    image: minio/minio:latest
    container_name: hobby_minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - ./data/minio:/data
    networks:
      - hobby_network
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: always

  # Container to create bucket and set public policy
  minio-create-bucket:
    image: minio/mc:latest
    depends_on:
      - minio
    networks:
      - hobby_network
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      /usr/bin/mc config host add myminio http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb myminio/hobbyhold || true;
      /usr/bin/mc anonymous set public myminio/hobbyhold;
      exit 0;
      "

networks:
  hobby_network:
    driver: bridge
