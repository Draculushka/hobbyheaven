permissions:
  contents: write
  pull-requests: write
name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-cov httpx

      - name: Run tests with coverage
        env:
          SECRET_KEY: ci-test-secret-key
          DATABASE_URL: "sqlite://"
          PYTHONPATH: .
        run: pytest tests/ -v --tb=short --cov=. --cov-report=term-missing --cov-fail-under=40

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt ruff

      - name: Check syntax (compile all .py files)
        env:
          SECRET_KEY: ci-lint-key
          DATABASE_URL: "sqlite://"
        run: find . -name "*.py" -not -path "./venv/*" -not -path "./.git/*" -exec python -m py_compile {} +

      - name: Ruff lint
        run: ruff check . --select=E,F,W --ignore=E501,E402 --exclude=migrations/,seed_hobbies.py --fix

  docker:
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t hobbyhold .

      - name: Smoke test — verify app imports
        env:
          SECRET_KEY: docker-smoke-key
          DATABASE_URL: "sqlite://"
        run: |
          docker run --rm \
            -e SECRET_KEY="$SECRET_KEY" \
            -e DATABASE_URL="$DATABASE_URL" \
            hobbyhold python -c "from main import app; print('App OK')"

  notify:
    runs-on: ubuntu-latest
    needs: [test, lint, docker]
    if: failure() && github.event_name == 'push'

    steps:
      - name: Notify committer about failure
        uses: actions/github-script@v7
        with:
          script: |
            const commit = context.sha;
            const repo = context.repo;
            const run_url = `https://github.com/${repo.owner}/${repo.repo}/actions/runs/${context.runId}`;

            await github.rest.repos.createCommitComment({
              owner: repo.owner,
              repo: repo.repo,
              commit_sha: commit,
              body: `⚠️ **CI Failed**\n\nСборка или тесты упали для этого коммита.\n\n🔗 [Посмотреть логи](${run_url})\n\nПожалуйста, проверьте и исправьте проблему.`
            });
